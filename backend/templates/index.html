<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trading Buddy (AI & Statistical Integration)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; background:#0f172a; color:#e5e7eb; }
    h1 { margin-bottom: 0.25rem; }
    small { color:#9ca3af; }
    .row { display:flex; gap:1rem; flex-wrap:wrap; margin-top:1.5rem; }
    .card { flex:1 1 300px; border:1px solid #374151; border-radius:0.75rem; padding:1rem; background:#020617; }
    button { padding:0.4rem 0.8rem; border-radius:999px; border:none; cursor:pointer; font-weight:600; }
    button.primary { background:#3b82f6; color:white; }
    button.success { background:#22c55e; color:white; }
    pre { font-size:0.8rem; background:#020617; border-radius:0.5rem; padding:0.5rem; overflow:auto; border:1px solid #1f2937; }
    .error { margin-top:0.5rem; color:#fecaca; font-size:0.85rem; }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; margin-top:0.5rem; }
    th, td { padding:0.35rem 0.2rem; border-bottom:1px solid #1f2937; text-align:left; }
    .clickable-symbol { cursor: pointer; font-weight: 700; color:#ffffff; text-decoration: underline; }
    .clickable-symbol:hover { color:#e5e5e5; text-decoration:underline; }

    #news-section {
      margin-top:1.5rem;
      padding:1rem;
      border:1px solid #374151;
      border-radius:0.75rem;
      background:#020617;
      max-height:70vh;
      overflow-y:auto;
    }

    #news-content { margin-top:1rem; }
    .news-item { padding:0.75rem; margin-bottom:0.5rem; background:#0f172a; border-radius:0.5rem; border-left:3px solid #3b82f6; max-height:300px; overflow-y:auto; overflow-x:hidden;word-wrap:break-word;}
    .news-item pre {
    white-space:pre-wrap;
    word-wrap:break-word;
    overflow-x:hidden; }

    h3 { margin:0 0 0.5rem 0; font-size:1rem; }
    p { margin:0 0 0.5rem 0; line-height:1.4; }
    .sources { font-size:0.75rem; color:#9ca3af; margin-top:0.5rem; }
    a { color:#3b82f6; text-decoration:underline; }

    # Decision Color Coding
    .decision-buy { color: #22c55e; font-weight: 600; }
    .decision-caution { color: #eab308; font-weight: 600; }
    .decision-nobuy { color: #ef4444; font-weight: 600; }

  </style>
</head>
<body>
  <h1>Trading Buddy (AI & Statistical Integration)</h1>
  <small>Your top software for trading strategies.</small>

  <div class="row">
<!--    <div class="card">-->
<!--      <h2>Top 5 Analysis</h2>-->
<!--      <button id="btn-analysis" class="primary">Run analysis</button>-->
<!--      <div id="analysis-error" class="error"></div>-->
<!--      <p><small>Symbols:</small> <span id="analysis-symbols">none</span></p>-->
<!--      <pre id="analysis-json" hidden></pre>-->
<!--    </div>-->

    <div class="card">
      <h2>Top 5 Signals</h2>
      <button id="btn-signals" class="success">Get signals</button>
      <div id="signals-error" class="error"></div>
      <div id="signals-content"><small>No data yet.</small></div>
      <small id="signals-hint" style="color:#9ca3af; display:none; margin-top:0.5rem; display:block;"></small>
    </div>
  </div>

  <div id="news-section" hidden>
    <h2>News / Analysis for <span id="news-symbol"></span></h2>
    <button id="close-news" style="float:right; margin-top:-2rem;">Close</button>
    <div id="news-loading" hidden><small>Loading news...</small></div>
    <div id="news-error" class="error"></div>
    <div id="news-content"></div>
  </div>

  <script>
    const BACKEND_URL = "http://127.0.0.1:8000"; // your FastAPI backend

    // const analysisBtn = document.getElementById("btn-analysis");
    const analysisSymbols = document.getElementById("analysis-symbols");
    const analysisJson = document.getElementById("analysis-json");
    const analysisError = document.getElementById("analysis-error");

    const signalsBtn = document.getElementById("btn-signals");
    const signalsContent = document.getElementById("signals-content");
    const signalsError = document.getElementById("signals-error");

    const newsSection = document.getElementById("news-section");
    const newsSymbolEl = document.getElementById("news-symbol");
    const newsLoading = document.getElementById("news-loading");
    const newsError = document.getElementById("news-error");
    const newsContent = document.getElementById("news-content");
    const closeNewsBtn = document.getElementById("close-news");

    const USE_MOCK_DATA = false;

    // Run Analysis
    // analysisBtn.onclick = async () => {
    //   analysisBtn.disabled = true;
    //   analysisError.textContent = "";
    //   analysisJson.hidden = true;
    //   analysisSymbols.textContent = "loading…";
    //   try {
    //     const res = await fetch(`${BACKEND_URL}/signals/top5`);
    //     const data = await res.json();
    //     const symbols = data.symbols || [];
    //     analysisSymbols.textContent = symbols.length ? symbols.join(", ") : "none";
    //     analysisJson.textContent = JSON.stringify(data.signals || {}, null, 2);
    //     analysisJson.hidden = false;
    //   } catch(e) {
    //     analysisError.textContent = e.message;
    //     analysisSymbols.textContent = "error";
    //   } finally { analysisBtn.disabled = false; }
    // };

    // Get Signals
    signalsBtn.onclick = async () => {
      signalsBtn.disabled = true;
      signalsError.textContent = "";
      signalsContent.innerHTML = "<small>Loading…</small>";
      try {
        const res = await fetch(`${BACKEND_URL}/signals/top5`);
        const data = await res.json();
        const symbols = data.symbols || [];
        const sigs = data.signals || {};
        if (!symbols.length) { signalsContent.innerHTML="<small>No symbols returned.</small>"; signalsBtn.disabled=false; return; }
        renderSignalsTable(symbols, sigs);
      } catch(e) {
        signalsError.textContent = e.message;
        signalsContent.innerHTML="<small>Error.</small>";
      } finally { signalsBtn.disabled=false; }
    };

    function renderSignalsTable(symbols, sigs) {
  let html = "<table><thead><tr><th>Symbol</th><th>Decision</th><th>Risk</th><th>Gains</th></tr></thead><tbody>";

  for (let i=0;i<symbols.length;i++) {
    const s = symbols[i];
    const info = sigs[s];

    if (!info || info.error) {
      html += `<tr>
        <td><span class="clickable-symbol" data-symbol="${s}" data-index="${i}">${s}</span></td>
        <td colspan="3" style="color:#fecaca;">${info?.error || "error"}</td>
      </tr>`;
      continue;
    }

    // Color Coding Logic
    let decisionClass = "decision-nobuy"; // default red
    const d = info.decision.toLowerCase();

    if (d.includes("do not buy") || d.includes("don't buy")) {
      decisionClass = "decision-nobuy"; // red
    }
    else if (d.includes("caution")) {
      decisionClass = "decision-caution"; // yellow
    }
    else if (d.includes("buy")) {
      decisionClass = "decision-buy"; // green
    }

    html += `<tr>
      <td><span class="clickable-symbol" data-symbol="${s}" data-index="${i}">${s}</span></td>
      <td class="${decisionClass}">${info.decision}</td>
      <td>${Number(info.avg_risk || 0).toFixed(2)}</td>
      <td>${Number(info.avg_gains || 0).toFixed(2)}</td>
    </tr>`;
  }

  html += "</tbody></table>";
  signalsContent.innerHTML = html;
  document.getElementById("signals-hint").textContent = "Click on a symbol to access news";
  document.getElementById("signals-hint").style.display = "block";

  document.querySelectorAll('.clickable-symbol').forEach(el => {
    el.onclick = () => fetchAnalysisByIndex(Number(el.dataset.index), el.dataset.symbol);
  });
}


    async function fetchAnalysisByIndex(index, symbolHint="") {
      newsSection.hidden=false;
      newsSymbolEl.textContent=symbolHint||"#"+index;
      newsLoading.hidden=false; newsError.textContent=""; newsContent.innerHTML="";
      newsSection.scrollIntoView({behavior:"smooth"});
      try {
        const res = await fetch(`${BACKEND_URL}/analyze/top5/${index}`);
        const data = await res.json();
        displayAnalysisResult(data);
      } catch(e) { newsError.textContent=e.message; }
      finally { newsLoading.hidden=true; }
    }

    function displayAnalysisResult(data){
      const symbol = data.symbol || newsSymbolEl.textContent || "N/A";
      newsSymbolEl.textContent = symbol;
      let html="";
      if(data.summary) html += `<div class="news-item"><h3>Summary</h3><p style="color:#9ca3af;">${escapeHtml(data.summary)}</p></div>`;
      if(Array.isArray(data.news)){
        for(const n of data.news){
          const preview=(n.content||"").substring(0,300)+((n.content||"").length>300?"...":"");
          html+=`<div class="news-item"><h3>${escapeHtml(n.title||"Untitled")}</h3><p style="color:#9ca3af;">${escapeHtml(preview)}</p>
          ${n.publisher?`<span>Publisher: <strong>${escapeHtml(n.publisher)}</strong></span>`:""}
          ${n.link?`<a href="${escapeHtml(n.link)}" target="_blank" rel="noopener noreferrer">Read full article →</a>`:""}
          </div>`;
        }
      }
      if(data.details && typeof data.details==="object"){
        html+=`<div class="news-item"><h3>Details (raw)</h3><pre>${escapeHtml(JSON.stringify(data.details,null,2))}</pre></div>`;
      }
      if(!html) html=`<div class="news-item"><pre>${escapeHtml(JSON.stringify(data,null,2))}</pre></div>`;
      newsContent.innerHTML=html;
    }

    function escapeHtml(unsafe){if(!unsafe) return ""; return String(unsafe).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}

    closeNewsBtn.onclick = ()=>{ newsSection.hidden = true; };
  </script>
</body>
</html>
